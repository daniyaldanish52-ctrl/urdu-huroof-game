<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اردو حروف پہچانو</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#6dd5ed,#2193b0);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

/* Container setups */
.auth-container {
    width:100%;
    max-width:550px;
    background:#fff;
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.game-layout {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 900px;
    align-items: flex-start;
}

.leaderboard {
    flex: 1;
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,.2);
    text-align: right;
}

.game{
    flex: 2;
    background:#fff;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1, h2, h3{
    color:#333;
    margin-bottom:15px;
}

/* Tabs for Auth */
.auth-tabs {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
    border-bottom: 2px solid #eee;
}

.auth-tab {
    padding: 10px 20px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    color: #666;
    border-bottom: 3px solid transparent;
}

.auth-tab.active {
    color: #2196F3;
    border-bottom-color: #2196F3;
}

/* Form Styles */
.form-group {
    margin-bottom: 15px;
    text-align: right;
}

.form-group label {
    display: block;
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 5px;
    color: #444;
}

.form-group input, .form-group select {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    border: 2px solid #ddd;
    border-radius: 10px;
    outline: none;
    text-align: center;
}

.form-group input:focus, .form-group select:focus {
    border-color: #2196F3;
}

.btn-submit {
    width: 100%;
    background: #4CAF50;
    color: white;
    border: none;
    padding: 12px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
}

.btn-submit:hover {
    background: #45a049;
}

.success-alert {
    background: #e8f5e9;
    color: #2e7d32;
    padding: 15px;
    border-radius: 10px;
    margin-top: 15px;
    font-size: 16px;
    display: none;
    text-align: right;
    border: 1px solid #c8e6c9;
}

.forgot-link {
    display: block;
    margin-top: 10px;
    color: #1976d2;
    cursor: pointer;
    text-decoration: underline;
    font-size: 14px;
}

/* Leaderboard styles */
.lb-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

.lb-table th, .lb-table td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #eee;
    font-size: 14px;
}

.lb-table th {
    background-color: #f5f5f5;
    color: #333;
}

/* Game Styles */
.top{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    font-weight:bold;
}

.progress{
    width:100%;
    height:12px;
    background:#eee;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#4CAF50;
    transition:.3s;
}

.letter{
    font-size:90px;
    color:#1976d2;
    margin:15px 0;
    font-weight:bold;
}

.question{
    font-size:22px;
    margin-bottom:15px;
}

.options{
    display:grid;
    gap:10px;
}

.option{
    border:none;
    padding:15px;
    font-size:24px;
    border-radius:12px;
    background:#f3f3f3;
    cursor:pointer;
}

.option:hover{
    background:#e6e6e6;
}

.message{
    min-height:40px;
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
}

.nextBtn,
.restartBtn,
.logoutBtn{
    margin-top:15px;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-size:18px;
}

.nextBtn{
    background:#4CAF50;
    display:none;
}

.restartBtn{
    background:#2196F3;
}

.logoutBtn {
    background: #f44336;
    margin-top: 10px;
    padding: 5px 15px;
    font-size: 14px;
}

@media(max-width:768px){
    .game-layout {
        flex-direction: column;
    }
    .leaderboard, .game {
        width: 100%;
    }
}

@media(max-width:480px){
    .letter{
        font-size:70px;
    }

    .option{
        font-size:20px;
    }
}
</style>
</head>
<body>

<!-- Login/Signup Screen -->
<div class="auth-container" id="authScreen">
    <h1 id="welcomeTitle">🎈 خوش آمدید!</h1>
    
    <div class="auth-tabs">
        <span class="auth-tab active" id="tabSignup" onclick="switchTab('signup')">نیا اکاؤنٹ (Signup)</span>
        <span class="auth-tab" id="tabSignin" onclick="switchTab('signin')">لاگ ان (Sign in)</span>
    </div>

    <!-- Signup Form -->
    <div id="signupForm">
        <div class="form-group">
            <label>والدین کی ای میل (Email):</label>
            <input type="email" id="regEmail" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
            <label>بچے کی جنس (Gender):</label>
            <select id="regGender">
                <option value="👦 لڑکا">👦 لڑکا</option>
                <option value="👧 لڑکی">👧 لڑکی</option>
            </select>
        </div>
        <div class="form-group">
            <label>بچے کی تاریخِ پیدائش (DOB):</label>
            <input type="date" id="regDob" required>
        </div>
        <button class="btn-submit" onclick="handleSignup()">اکاؤنٹ بنائیں 🚀</button>
        <div class="success-alert" id="signupSuccessAlert"></div>
    </div>

    <!-- Signin Form -->
    <div id="signinForm" style="display: none;">
        <div class="form-group">
            <label>بچے کا یوزر نیم (Username):</label>
            <input type="text" id="loginUsername" placeholder="مثال: UrduHero7">
        </div>
        <div class="form-group">
            <label>پاس ورڈ (Password):</label>
            <input type="password" id="loginPass" placeholder="اپنا پاس ورڈ لکھیں">
        </div>
        <button class="btn-submit" onclick="handleSignin()">کھیل میں داخل ہوں 🎮</button>
        
        <span class="forgot-link" onclick="handleForgotPassword()">پاس ورڈ بھول گئے؟ 🔑</span>
    </div>
</div>

<!-- Game Layout Screen (Includes Leaderboard on left and Game on right) -->
<div class="game-layout" id="gameLayoutScreen" style="display: none;">
    
    <!-- Leaderboard (Left Side) -->
    <div class="leaderboard">
        <h3>🏆 لیڈر بورڈ (سب سے تیز بچے)</h3>
        <table class="lb-table">
            <thead>
                <tr>
                    <th>نام</th>
                    <th>جنس</th>
                    <th>درستی</th>
                    <th>وقت</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                <!-- Dummy & Real Data will be inserted here -->
            </tbody>
        </table>
    </div>

    <!-- Main Game (Right Side) -->
    <div class="game" id="gameScreen">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>🐘 اردو حروف پہچانو</h1>
            <button class="logoutBtn" onclick="logout()">باہر نکلیں 🚪</button>
        </div>

        <div class="top">
            <div>⭐ اسکور: <span id="score">0</span></div>
            <div>کھلاڑی: <span id="playerName" style="color:#1976d2;"></span></div>
            <div>سوال: <span id="qNo">1</span></div>
        </div>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="question">
        اس حرف سے شروع ہونے والا لفظ منتخب کریں
        </div>

        <div class="letter" id="letter"></div>

        <div class="options" id="options"></div>

        <div class="message" id="message"></div>

        <button class="nextBtn" id="nextBtn" onclick="nextQuestion()">
        اگلا سوال ➡️
        </button>
    </div>
</div>

<script>

const questions = [
{letter:"ا", correct:"🍎 انار", options:["🍎 انار","🐱 بلی","🚗 گاڑی"]},
{letter:"ب", correct:"🐱 بلی", options:["🐱 بلی","🍋 لیموں","✈️ جہاز"]},
{letter:"پ", correct:"🪁 پتنگ", options:["🪁 پتنگ","🐘 ہاتھی","📘 کتاب"]},
{letter:"ت", correct:"🍉 تربوز", options:["🍉 تربوز","🐟 مچھلی","🚲 سائیکل"]},
{letter:"ج", correct:"✈️ جہاز", options:["✈️ جہاز","🍎 انار","🐱 بلی"]}
// سوالات کو چھوٹا رکھا گیا ہے ٹیسٹنگ کے لیے، آپ اپنے پرانے باقی سوالات یہاں واپس ڈال سکتے ہیں
];

let current = 0;
let score = 0;
let currentUser = null;
let startTime = null;

// Dummy leaderboard data to make it look active
let defaultLeaderboard = [
    {username: "UrduChamp3", gender: "👦 لڑکا", accuracy: "100%", time: "12s"},
    {username: "KidStar9", gender: "👧 لڑکی", accuracy: "100%", time: "15s"},
    {username: "Smarty2", gender: "👦 لڑکا", accuracy: "80%", time: "11s"}
];

// Switch between Signup and Signin tabs
function switchTab(tab) {
    document.getElementById('signupSuccessAlert').style.display = "none";
    
    if (tab === 'signup') {
        document.getElementById('tabSignup').classList.add('active');
        document.getElementById('tabSignin').classList.remove('active');
        document.getElementById('signupForm').style.display = 'block';
        document.getElementById('signinForm').style.display = 'none';
    } else {
        document.getElementById('tabSignup').classList.remove('active');
        document.getElementById('tabSignin').classList.add('active');
        document.getElementById('signupForm').style.display = 'none';
        document.getElementById('signinForm').style.display = 'block';
    }
}

// Generate random friendly username
function generateRandomUsername() {
    const titles = ["UrduHero", "KidStar", "SuperKid", "UrduChamp", "Smarty"];
    const randomTitle = titles[Math.floor(Math.random() * titles.length)];
    const randomNumber = Math.floor(Math.random() * 10) + 1;
    return randomTitle + randomNumber;
}

// Register Child
function handleSignup() {
    const email = document.getElementById('regEmail').value.trim().toLowerCase();
    const dob = document.getElementById('regDob').value;
    const gender = document.getElementById('regGender').value;

    if (!email || !dob) {
        alert("براہ کرم ای میل اور تاریخِ پیدائش درج کریں! 😊");
        return;
    }

    if(localStorage.getItem('email_' + email)) {
        alert("یہ ای میل پہلے سے رجسٹرڈ ہے۔ براہ کرم لاگ ان کریں! 😊");
        switchTab('signin');
        return;
    }

    const generatedUsername = generateRandomUsername();
    const easyPassword = "urdu123";
    
    const userData = {
        email: email,
        dob: dob,
        gender: gender,
        username: generatedUsername,
        password: easyPassword
    };

    localStorage.setItem('email_' + email, JSON.stringify(userData));
    localStorage.setItem('user_' + generatedUsername.toLowerCase(), JSON.stringify(userData));

    const alertBox = document.getElementById('signupSuccessAlert');
    alertBox.style.display = "block";
    alertBox.innerHTML = `
        🎉 <b>اکاؤنٹ بن گیا ہے!</b><br><br>
        🔑 یوزر نیم: <b style="color:#1976d2; font-size: 20px;">${generatedUsername}</b><br>
        🔒 پاس ورڈ: <b style="color:#2e7d32; font-size: 20px;">${easyPassword}</b><br><br>
        اب اوپر <b>"لاگ ان (Sign in)"</b> بٹن پر کلک کریں اور گیم شروع کریں!
    `;
}

// Handle Manual Login
function handleSignin() {
    const usernameInput = document.getElementById('loginUsername').value.trim();
    const passInput = document.getElementById('loginPass').value.trim();

    if (!usernameInput || !passInput) {
        alert("براہ کرم یوزر نیم اور پاس ورڈ لکھیں! 🔑");
        return;
    }

    const storedData = localStorage.getItem('user_' + usernameInput.toLowerCase());

    if (storedData) {
        const user = JSON.parse(storedData);
        if (user.password === passInput) {
            loginUser(user);
        } else {
            alert("غلط پاس ورڈ! دوبارہ کوشش کریں ❌");
        }
    } else {
        alert("یہ یوزر نیم درست نہیں ہے! دوبارہ چیک کریں۔ 😊");
    }
}

// Forgot Password Feature (Popup)
function handleForgotPassword() {
    const emailPrompt = prompt("اکاؤنٹ بناتے وقت استعمال کی گئی ای میل (Email) لکھیں:");
    if (!emailPrompt) return;

    const emailClean = emailPrompt.trim().toLowerCase();
    const storedData = localStorage.getItem('email_' + emailClean);

    if (storedData) {
        const user = JSON.parse(storedData);
        // Alert Popup box as requested
        alert(`🗝️ اکاؤنٹ مل گیا ہے!\n\n👤 یوزر نیم: ${user.username}\n🔑 پاس ورڈ: ${user.password}`);
    } else {
        alert("معذرت، اس ای میل سے کوئی اکاؤنٹ نہیں ملا! ❌");
    }
}

// Update and Render Leaderboard
function renderLeaderboard() {
    const tbody = document.getElementById('leaderboardBody');
    tbody.innerHTML = "";

    // Get dynamic results saved in localStorage if any
    let scores = JSON.parse(localStorage.getItem('game_scores')) || [];
    
    // Combine dummy and real scores, sort by accuracy then time
    let combined = [...scores, ...defaultLeaderboard];
    
    combined.sort((a, b) => {
        let accA = parseInt(a.accuracy);
        let accB = parseInt(b.accuracy);
        if(accB !== accA) return accB - accA;
        return parseInt(a.time) - parseInt(b.time);
    });

    combined.slice(0, 5).forEach(player => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><b>${player.username}</b></td>
            <td>${player.gender || '👦 لڑکا'}</td>
            <td style="color:green; font-weight:bold;">${player.accuracy}</td>
            <td style="color:#1976d2;">${player.time}</td>
        `;
        tbody.appendChild(row);
    });
}

// Enter Game
function loginUser(user) {
    currentUser = user;
    document.getElementById('playerName').textContent = user.username;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('gameLayoutScreen').style.display = 'flex';
    
    current = 0;
    score = 0;
    document.getElementById("score").textContent = score;
    renderLeaderboard();
    startTime = new Date(); // Start timing the game
    loadQuestion();
}

// Logout
function logout() {
    currentUser = null;
    document.getElementById('authScreen').style.display = 'block';
    document.getElementById('gameLayoutScreen').style.display = 'none';
    
    document.getElementById('regEmail').value = "";
    document.getElementById('regDob').value = "";
    document.getElementById('loginUsername').value = "";
    document.getElementById('loginPass').value = "";
    document.getElementById('signupSuccessAlert').style.display = "none";
}

function shuffle(arr){
    return arr.sort(() => Math.random() - 0.5);
}

function loadQuestion(){
    const q = questions[current];

    document.getElementById("letter").textContent = q.letter;
    document.getElementById("qNo").textContent = current + 1;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    shuffle([...q.options]).forEach(option => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.textContent = option;
        btn.onclick = () => checkAnswer(option);
        optionsDiv.appendChild(btn);
    });

    document.getElementById("message").textContent = "";
    document.getElementById("nextBtn").style.display = "none";

    const progress = ((current) / questions.length) * 100;
    document.getElementById("progressBar").style.width = progress + "%";
}

function checkAnswer(selected){
    const q = questions[current];

    document.querySelectorAll(".option")
      .forEach(btn => btn.disabled = true);

    if(selected === q.correct){
        score++;
        document.getElementById("score").textContent = score;
        document.getElementById("message").innerHTML = "🎉 شاباش! درست جواب";
        document.getElementById("message").style.color = "green";
    }else{
        document.getElementById("message").innerHTML = "❌ غلط جواب<br>✔️ درست جواب: " + q.correct;
        document.getElementById("message").style.color = "red";
    }

    document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion(){
    current++;

    if(current >= questions.length){
        let endTime = new Date();
        let totalTimeTaken = Math.round((endTime - startTime) / 1000); // in seconds
        let accuracyPercent = Math.round((score / questions.length) * 100) + "%";

        // Save performance to leaderboard storage
        let scores = JSON.parse(localStorage.getItem('game_scores')) || [];
        scores.push({
            username: currentUser.username,
            gender: currentUser.gender,
            accuracy: accuracyPercent,
            time: totalTimeTaken + "s"
        });
        localStorage.setItem('game_scores', JSON.stringify(scores));
        
        renderLeaderboard();

        document.getElementById("gameScreen").innerHTML = `
        <h1>🏆 کھیل مکمل</h1>
        <br>
        <h2>شاباش ${currentUser.username}! آپ کا اسکور ${score} / ${questions.length} ہے! 🎉</h2>
        <p>آپ نے یہ گیم ${totalTimeTaken} سیکنڈز میں مکمل کی!</p>
        <br><br>
        <button class="restartBtn" onclick="restartGame()">
        🔄 دوبارہ کھیلیں
        </button>
        <button class="logoutBtn" style="display:block; margin: 15px auto;" onclick="location.reload()">
        🚪 لاگ آؤٹ کریں
        </button>
        `;
        return;
    }

    loadQuestion();
}

function restartGame(){
    location.reload();
}

</script>

</body>
</html>
