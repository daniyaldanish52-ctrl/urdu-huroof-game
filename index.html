<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اردو حروف پہچانو</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#6dd5ed,#2193b0);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

/* Auth Container */
.auth-container {
    width:100%;
    max-width:450px;
    background:#fff;
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

/* Layout: Game on Left, Leaderboard on Right */
.game-layout {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 950px;
    align-items: flex-start;
}

.game{
    flex: 2;
    background:#fff;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.leaderboard {
    flex: 1;
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,.2);
    text-align: left; /* English alignment for Leaderboard */
    direction: ltr; /* English direction */
}

h1, h2, h3{
    color:#333;
    margin-bottom:15px;
}

/* Form Styles */
.form-group {
    margin-bottom: 15px;
    text-align: center;
}

.form-group label {
    display: block;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
    color: #444;
}

.form-group input {
    width: 100%;
    padding: 12px;
    font-size: 20px;
    border: 2px solid #ddd;
    border-radius: 10px;
    outline: none;
    text-align: center;
}

.form-group input:focus {
    border-color: #2196F3;
}

.btn-submit {
    width: 100%;
    background: #4CAF50;
    color: white;
    border: none;
    padding: 12px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
}

.btn-submit:hover {
    background: #45a049;
}

/* Leaderboard styles (English) */
.lb-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

.lb-table th, .lb-table td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #eee;
    font-size: 14px;
}

.lb-table th {
    background-color: #f5f5f5;
    color: #333;
}

/* Game Styles */
.top{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    font-weight:bold;
}

.timer {
    background: #ffebee;
    color: #c62828;
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 16px;
}

.progress{
    width:100%;
    height:12px;
    background:#eee;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#4CAF50;
    transition:.3s;
}

.letter{
    font-size:90px;
    color:#1976d2;
    margin:15px 0;
    font-weight:bold;
}

.question{
    font-size:22px;
    margin-bottom:15px;
}

.options{
    display:grid;
    gap:10px;
}

.option{
    border:none;
    padding:15px;
    font-size:24px;
    border-radius:12px;
    background:#f3f3f3;
    cursor:pointer;
}

.option:hover{
    background:#e6e6e6;
}

.message{
    min-height:40px;
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
}

.nextBtn,
.restartBtn,
.logoutBtn{
    margin-top:15px;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-size:18px;
}

.nextBtn{
    background:#4CAF50;
    display:none;
}

.restartBtn{
    background:#2196F3;
}

.logoutBtn {
    background: #f44336;
    margin-top: 10px;
    padding: 5px 15px;
    font-size: 14px;
}

@media(max-width:768px){
    .game-layout {
        flex-direction: column-reverse; /* Game remains accessible */
    }
    .leaderboard, .game {
        width: 100%;
    }
}

@media(max-width:480px){
    .letter{
        font-size:70px;
    }

    .option{
        font-size:20px;
    }
}
</style>
</head>
<body>

<!-- Direct Username Input Screen -->
<div class="auth-container" id="authScreen">
    <h1>🎈 خوش آمدید!</h1>
    
    <div class="form-group">
        <label>Enter Username (English Only):</label>
        <input type="text" id="usernameInput" placeholder="e.g. Ali786" required>
    </div>
    <button class="btn-submit" onclick="startGame()">Start Game 🚀</button>
</div>

<!-- Game Layout (Game on Left, Leaderboard on Right) -->
<div class="game-layout" id="gameLayoutScreen" style="display: none;">
    
    <!-- Main Game (Left Side) -->
    <div class="game" id="gameScreen">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>🐘 اردو حروف پہچانو</h1>
            <div class="timer" id="gameTimer">Time: 10:00</div>
            <button class="logoutBtn" onclick="exitGame()">Exit 🚪</button>
        </div>

        <div class="top">
            <div>⭐ اسکور: <span id="score">0</span></div>
            <div>کھلاڑی: <span id="playerName" style="color:#1976d2;"></span></div>
            <div>سوال: <span id="qNo">1</span></div>
        </div>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="question">
        اس حرف سے شروع ہونے والا لفظ منتخب کریں
        </div>

        <div class="letter" id="letter"></div>

        <div class="options" id="options"></div>

        <div class="message" id="message"></div>

        <button class="nextBtn" id="nextBtn" onclick="nextQuestion()">
        اگلا سوال ➡️
        </button>
    </div>

    <!-- Leaderboard (Right Side - English Only) -->
    <div class="leaderboard">
        <h3 style="text-align: center;">🏆 Leaderboard</h3>
        <table class="lb-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Accuracy</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>
</div>

<script>

const questions = [
{letter:"ا", correct:"🍎 انار", options:["🍎 انار","🐱 بلی","🚗 گاڑی"]},
{letter:"ب", correct:"🐱 بلی", options:["🐱 بلی","🍋 لیموں","✈️ جہاز"]},
{letter:"پ", correct:"🪁 پتنگ", options:["🪁 پتنگ","🐘 ہاتھی","📘 کتاب"]},
{letter:"ت", correct:"🍉 تربوز", options:["🍉 تربوز","🐟 مچھلی","🚲 سائیکل"]},
{letter:"ج", correct:"✈️ جہاز", options:["✈️ جہاز","🍎 انار","🐱 بلی"]},
{letter:"چ", correct:"🐦 چڑیا", options:["🐦 چڑیا","📘 کتاب","🍋 لیموں"]},
{letter:"خ", correct:"🐰 خرگوش", options:["🐰 خرگوش","🚗 گاڑی","🐘 ہاتھی"]},
{letter:"د", correct:"🌳 درخت", options:["🌳 درخت","🐱 بلی","🍉 تربوز"]},
{letter:"ر", correct:"📻 ریڈیو", options:["📻 ریڈیو","✈️ جہاز","🐟 مچھلی"]},
{letter:"ز", correct:"🦒 زرافہ", options:["🦒 زرافہ","🍎 انار","📘 کتاب"]},
{letter:"س", correct:"🍎 سیب", options:["🍎 سیب","🚗 گاڑی","🐘 ہاتھی"]},
{letter:"ش", correct:"🦁 شیر", options:["🦁 شیر","🍋 لیموں","🐱 بلی"]},
{letter:"ط", correct:"🦜 طوطا", options:["🦜 طوطا","🌳 درخت","📻 ریڈیو"]},
{letter:"ع", correct:"👓 عینک", options:["👓 عینک","🍉 تربوز","🐰 خرگوش"]},
{letter:"غ", correct:"🎈 غبارہ", options:["🎈 غبارہ","🐦 چڑیا","🍎 سیب"]},
{letter:"ف", correct:"🐘 فیل", options:["🐘 فیل","📘 کتاب","🚗 گاڑی"]},
{letter:"ق", correct:"✏️ قلم", options:["✏️ قلم","🐱 بلی","🍋 لیموں"]},
{letter:"ک", correct:"📘 کتاب", options:["📘 کتاب","🦁 شیر","🎈 غبارہ"]},
{letter:"گ", correct:"⚽ گیند", options:["⚽ گیند","✈️ جہاز","🍉 تربوز"]},
{letter:"ل", correct:"🍋 لیموں", options:["🍋 لیموں","🐘 فیل","📻 ریڈیو"]},
{letter:"م", correct:"🐟 مچھلی", options:["🐟 مچھلی","🍎 انار","🌳 درخت"]},
{letter:"ن", correct:"🥥 ناریل", options:["🥥 ناریل","📘 کتاب","🐱 بلی"]},
{letter:"و", correct:"🌹 ورد", options:["🌹 ورد","🦜 طوطا","🍋 لیموں"]},
{letter:"ہ", correct:"🐘 ہاتھی", options:["🐘 ہاتھی","🎈 غبارہ","⚽ گیند"]},
{letter:"ی", correct:"🏅 یکم", options:["🏅 یکم","🐟 مچھلی","📻 ریڈیو"]}
];

let current = 0;
let score = 0;
let currentUser = "";
let startTime = null;
let timerInterval = null;
const TIME_LIMIT = 600; // 10 Minutes in seconds (600)
let timeLeft = TIME_LIMIT;

// English default leaderboard data
let defaultLeaderboard = [
    {username: "UrduChamp3", accuracy: "100%", time: "38s"},
    {username: "KidStar9", accuracy: "96%", time: "45s"},
    {username: "Smarty2", accuracy: "88%", time: "52s"}
];

// Check and Save Unique Username
function startGame() {
    const username = document.getElementById('usernameInput').value.trim();
    
    // Validate English Username only
    const englishRegex = /^[A-Za-z0-9_]+$/;

    if (!username) {
        alert("Please enter a username! 😊");
        return;
    }

    if (!englishRegex.test(username)) {
        alert("Please use English letters and numbers only! (e.g. Ali12)");
        return;
    }

    // Check uniqueness in LocalStorage
    let existingScores = JSON.parse(localStorage.getItem('game_scores')) || [];
    let isTaken = existingScores.some(score => score.username.toLowerCase() === username.toLowerCase());

    if (isTaken) {
        alert("This username is already taken! Please choose another cute name. 👦👧");
        return;
    }

    currentUser = username;
    document.getElementById('playerName').textContent = username;
    
    // Switch Screens
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('gameLayoutScreen').style.display = 'flex';
    
    // Init Game Settings
    current = 0;
    score = 0;
    timeLeft = TIME_LIMIT;
    document.getElementById("score").textContent = score;
    renderLeaderboard();
    startTime = new Date();
    
    // Start 10-Min Timer
    startTimer();
    loadQuestion();
}

// 10-Minute Countdown Timer
function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        
        // Formatting seconds with leading zero
        seconds = seconds < 10 ? "0" + seconds : seconds;
        document.getElementById('gameTimer').textContent = `Time: ${minutes}:${seconds}`;

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("⏰ Time Over! Try again and be faster next time!");
            exitGame();
        }
    }, 1000);
}

// Render Leaderboard (English Only)
function renderLeaderboard() {
    const tbody = document.getElementById('leaderboardBody');
    tbody.innerHTML = "";

    let scores = JSON.parse(localStorage.getItem('game_scores')) || [];
    let combined = [...scores, ...defaultLeaderboard];
    
    // Sort by accuracy (highest first) and then time (lowest first)
    combined.sort((a, b) => {
        let accA = parseInt(a.accuracy);
        let accB = parseInt(b.accuracy);
        if(accB !== accA) return accB - accA;
        return parseInt(a.time) - parseInt(b.time);
    });

    combined.slice(0, 5).forEach((player, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>#${index + 1}</td>
            <td><b>${player.username}</b></td>
            <td style="color:green; font-weight:bold;">${player.accuracy}</td>
            <td style="color:#1976d2;">${player.time}</td>
        `;
        tbody.appendChild(row);
    });
}

function shuffle(arr){
    return arr.sort(() => Math.random() - 0.5);
}

function loadQuestion(){
    const q = questions[current];

    document.getElementById("letter").textContent = q.letter;
    document.getElementById("qNo").textContent = current + 1;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    shuffle([...q.options]).forEach(option => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.textContent = option;
        btn.onclick = () => checkAnswer(option);
        optionsDiv.appendChild(btn);
    });

    document.getElementById("message").textContent = "";
    document.getElementById("nextBtn").style.display = "none";

    const progress = ((current) / questions.length) * 100;
    document.getElementById("progressBar").style.width = progress + "%";
}

function checkAnswer(selected){
    const q = questions[current];

    document.querySelectorAll(".option")
      .forEach(btn => btn.disabled = true);

    if(selected === q.correct){
        score++;
        document.getElementById("score").textContent = score;
        document.getElementById("message").innerHTML = "🎉 شاباش! درست جواب";
        document.getElementById("message").style.color = "green";
    }else{
        document.getElementById("message").innerHTML = "❌ غلط جواب<br>✔️ درست جواب: " + q.correct;
        document.getElementById("message").style.color = "red";
    }

    document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion(){
    current++;

    if(current >= questions.length){
        clearInterval(timerInterval);
        
        let endTime = new Date();
        let totalTimeTaken = Math.round((endTime - startTime) / 1000);
        let accuracyPercent = Math.round((score / questions.length) * 100) + "%";

        // Save performance to leaderboard storage
        let scores = JSON.parse(localStorage.getItem('game_scores')) || [];
        scores.push({
            username: currentUser,
            accuracy: accuracyPercent,
            time: totalTimeTaken + "s"
        });
        localStorage.setItem('game_scores', JSON.stringify(scores));
        
        renderLeaderboard();

        document.getElementById("gameScreen").innerHTML = `
        <h1>🏆 کھیل مکمل</h1>
        <br>
        <h2>Well done, ${currentUser}! Your score is ${score} / ${questions.length}! 🎉</h2>
        <p>You completed the game in ${totalTimeTaken} seconds!</p>
        <br><br>
        <button class="restartBtn" onclick="restartGame()">
        🔄 Play Again
        </button>
        <button class="logoutBtn" style="display:block; margin: 15px auto;" onclick="exitGame()">
        🚪 Main Menu
        </button>
        `;
        return;
    }

    loadQuestion();
}

function exitGame() {
    clearInterval(timerInterval);
    currentUser = "";
    document.getElementById('usernameInput').value = "";
    document.getElementById('authScreen').style.display = 'block';
    document.getElementById('gameLayoutScreen').style.display = 'none';
}

function restartGame(){
    location.reload();
}

// Render Leaderboard on Load to keep it updated
renderLeaderboard();

</script>

</body>
</html>
